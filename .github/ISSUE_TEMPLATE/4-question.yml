name: Question / discussion
description: Ask a question or start a general discussion
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For general questions, usage help, or discussions. For bugs use Bug report; for new ideas use Feature request.
  - type: textarea
    id: question
    attributes:
      label: Your question or topic
      description: What would you like to discuss or understand?
      placeholder: e.g. "How do I run export for only organizations and teams?"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: AAP version, what you've tried, or links that might help.
    validations:
      required: false
