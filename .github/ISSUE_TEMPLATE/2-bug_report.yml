name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search existing issues first to avoid duplicates.
  - type: checkboxes
    id: searched
    attributes:
      label: Duplicate check
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug or error.
      placeholder: e.g. "Export fails with... when running ./export.sh TAMLab AAP25"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run ./export.sh <org> <env>
        2. With tags ...
        3. See error
    validations:
      required: true
  - type: input
    id: aap-version
    attributes:
      label: AAP version
      description: e.g. 2.5, 2.6
      placeholder: "2.5"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How you're running (ansible-playbook vs ansible-navigator, OS, etc.).
      placeholder: |
        - OS: Fedora 43
        - Run method: ansible-navigator
        - Collections path: collections/2.5
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log or error output
      description: Paste any error messages or log excerpts. Use a fenced code block if possible.
      render: shell
    validations:
      required: false
