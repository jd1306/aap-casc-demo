---
# tasks file for flat_to_filetree
- name: 🚧 Validate input variables
  ansible.builtin.assert:
    that:
      - flat_to_filetree_source_path is defined and flat_to_filetree_source_path | length > 0
      - flat_to_filetree_output_path is defined and flat_to_filetree_output_path | length > 0
    fail_msg: "Please define 'flat_to_filetree_source_path' and/or 'flat_to_filetree_output_path'"

- name: 🔎 Find all var files
  ansible.builtin.find:
    paths: "{{ flat_to_filetree_source_path }}"
    recurse: true
    patterns:
      - '*.yml'
      - '*.yaml'
    file_type: file
    excludes:
      - "ignore_*"
  register: found_var_files

- name: Initialize empty var dictionary
  ansible.builtin.set_fact:
    loaded_vars_combined: {}

- name: Read and parse var files without templating
  ansible.builtin.set_fact:
    loaded_vars_combined: "{{ loaded_vars_combined | combine(parsed_content) }}"
  vars:
    # 1. Read the raw text using the 'cat' pipe (to avoid templating)
    raw_content: "{{ lookup('pipe', 'cat ' + item) }}"
    # 2. Pre-process the text to remove '!unsafe' which breaks from_yaml
    clean_content: "{{ raw_content | replace('!unsafe', '') }}"
    # 3. Parse the clean text with from_yaml.
    parsed_content: "{{ clean_content | from_yaml }}"
  loop: "{{ found_var_files.files | map(attribute='path') | list }}"
  loop_control:
    loop_var: item
  when: found_var_files.files | length > 0

- name: Filter map to only include variables that exist
  ansible.builtin.set_fact:
    __filtered_folder_map: >-
      {%- set existing = {} -%}
      {%- for var_name, folder_name in flat_to_filetree_var_to_folder_map.items() -%}
        {#- Check if the var_name is a key in our combined dictionary -#}
        {%- if var_name in loaded_vars_combined -%}
          {%- set _ = existing.update({var_name: folder_name}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ existing }}

- name: 🔀 Iterate over the var-to-folder map to split
  ansible.builtin.include_tasks: split_var_list.yml
  loop: "{{ __filtered_folder_map | default({}) | dict2items }}"
  loop_control:
    loop_var: map_item

- name: 🔎 Find all generated YAML files in the output path
  ansible.builtin.find:
    paths: "{{ flat_to_filetree_output_path }}"
    recurse: true
    patterns:
      - '*.yml'
      - '*.yaml'
    file_type: file
    excludes:
      - "ignore_*"
  register: __found_yaml_files

- name: "Re-write all the generated files to make them more readable"
  format_yaml:
    path: "{{ _current_file.path }}"
    explicit_start: true # Forces ---
    explicit_end: true   # Forces ...
    auto_block_scalars: true # If a string contains a newline, convert it to a PreservedScalarString (|).
  loop: "{{ __found_yaml_files.files }}"
  loop_control:
    loop_var: _current_file
    label: "{{ _current_file.path.split('/')[-2:] | join('/') }}"
...
