---
# This file is called by split_var_list.yml
# It expects 'rule' (from the loop) and all 'target_*' vars to be set.
# Its only job is to APPEND to the '__files_to_create' fact.

# Filter the main list to *only* items that have our rule's key
- name: "Filter list for items matching rule key '{{ rule.key }}'"
  ansible.builtin.set_fact:
    filtered_list: "{{ target_var_value | selectattr(rule.key, 'defined') | list }}"

# Group the list *once* and save it as a fact.
# Do not use Jinja groupby() here: its result (even in loop:) is GroupTuple, which Ansible warns on.
# Equivalent: unique values of rule.key, sorted like groupby, then selectattr per key.
# Reset each time this file runs (loop over rules) so we do not append to a previous rule's groups.
- name: "Reset grouped list for this rule"
  ansible.builtin.set_fact:
    grouped_list_of_lists: []
  when:
    - filtered_list | length > 0

- name: "Group items and store as list of lists"
  ansible.builtin.set_fact:
    grouped_list_of_lists: "{{ grouped_list_of_lists + [[item, filtered_list | selectattr(rule.key, 'equalto', item) | list]] }}"
  loop: "{{ filtered_list | map(attribute=rule.key) | list | unique | sort }}"
  loop_control:
    loop_var: item
  when:
    - filtered_list | length > 0
  changed_when: false # This is just a fact, not a change

# Build the final list of files to create
- name: "Append file objects for rule '{{ rule.key }}'"
  ansible.builtin.set_fact:
    # Append the new 'file_item' object to the '__files_to_create' list
    __files_to_create: "{{ __files_to_create + [file_item] }}"
  loop: "{{ grouped_list_of_lists | default([]) }}"
  loop_control:
    loop_var: group_list # This is a list, e.g., ['name1', [item1]]
    label: "{{ group_key }}"
  vars:
    # Use index 0 for the grouper, index 1 for the list
    group_key: "{{ group_list[0] }}"
    item_list: "{{ group_list[1] | list }}"

    # Use the 'filename' from the rule if it exists,
    # otherwise, default to the 'group_key'.yml
    filename_to_use: "{{ rule.filename | default(group_key ~ '.yml') }}"

    content_dict: "{{ {target_var_name: item_list} }}"

    file_item:
      subfolder: "{{ rule.subfolder }}"
      filename: "{{ filename_to_use }}"
      content: "{{ content_dict | to_nice_yaml(indent=2, sort_keys=False, explicit_start=True) }}"
  when:
    - filtered_list | length > 0
...
