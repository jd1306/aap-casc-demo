---
# Filter the AAP organization to export.  If not set, all organizations the provided credentials have access to will be exported.
# Example: organization_filter: 'Default'
# organization_filter: ''

# Imports objects as flat as possible (no sub-folders, "like" objects in same file)
# If set to true, the import process will read every YAML file it finds recursively under the import directory (and common directory).
# If set to false, the import process will read the filetree layout (e.g. controller_projects.d/gateway_teams.d/etc.).
flatten_output: false

# Replaces '$encrypted$' with a custom variable name, thus requiring
# the var to be defined before it can be imported back in
secrets_as_variables: true

# New var (mentioned above) prefix
secrets_as_variables_prefix: "vault"

# Each "instance" has its own imports folder, but for objects that you want the same
# across multiple instances, you can put those in the "orgs_vars/<org_name>/common" folder.
# If this is "true", the "import" process will grab these as well. To prevent this,
# change this to "false".
import_common: true
...
